<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Rock Paper Scissors</h1>
    <div class="contains">
        <div class="cont" id="rock">
            <img src="rock.avif" alt="Rock" id="rock" >
        </div>
        <div class="cont" id="paper">
            <img src="paper.jpg" alt="Paper" id="paper" >    
        </div>
        <div class="cont" id="scissors">
            <img src="scissor.png" alt="Scissors" id="scissors">
        </div>
    </div>
    <div class="scoreboard">
        <div class="score">
            <p id="p1score">0</p>
            <p>YOU</p>
        </div>
        <div class="score">
            <p id="p2score">0</p>
            <p>COMPUTER</p>
        </div>
    </div>
    <div class="result">
        <p id="result">Make your move!</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
